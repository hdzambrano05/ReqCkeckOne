<div class="forgot-wrapper">
  <div class="forgot-shape forgot-shape-1"></div>
  <div class="forgot-shape forgot-shape-2"></div>
  <div class="forgot-shape forgot-shape-3"></div>

  <div class="forgot-card">
    <div class="forgot-header">
      <div class="forgot-icon-box">
        <i class="bi bi-shield-lock-fill"></i>
      </div>

      <h2>Recuperar contraseña</h2>
      <p class="forgot-subtitle">
        Ingresa tu usuario o correo electrónico para continuar con el cambio de contraseña.
      </p>
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="forgot-form" novalidate>
      <div class="form-field">
        <label for="identifier">Usuario o correo electrónico</label>

        <div class="input-wrapper" [class.input-error]="identifier?.invalid && identifier?.touched">
          <div class="input-icon">
            <i class="bi bi-person-badge-fill"></i>
          </div>

          <input
            id="identifier"
            type="text"
            formControlName="identifier"
            class="form-control-custom"
            placeholder="Ej: usuario123 o correo@dominio.com"
            autocomplete="off"
          />
        </div>

        <div class="field-error" *ngIf="identifier?.invalid && identifier?.touched">
          <i class="bi bi-exclamation-circle-fill"></i>
          <span>Debes ingresar un usuario o correo para continuar.</span>
        </div>
      </div>

      <button type="submit" class="btn-submit-custom" [disabled]="loading">
        <span class="btn-content" *ngIf="!loading">
          <i class="bi bi-arrow-right-circle-fill"></i>
          <span>Continuar</span>
        </span>

        <span class="btn-content" *ngIf="loading">
          <i class="bi bi-arrow-repeat spin"></i>
          <span>Buscando usuario...</span>
        </span>
      </button>
    </form>

    <div class="forgot-footer">
      <a routerLink="/login" class="back-login-link">
        <i class="bi bi-arrow-left"></i>
        <span>Volver al inicio de sesión</span>
      </a>
    </div>
  </div>

  <!-- Modal de error -->
  <div class="custom-modal-overlay" *ngIf="errorMessage">
    <div class="custom-modal modal-error">
      <div class="modal-top">
        <div class="modal-icon error-icon">
          <i class="bi bi-x-circle-fill"></i>
        </div>
        <h3>No se pudo continuar</h3>
        <p>{{ errorMessage }}</p>
      </div>

      <div class="modal-actions">
        <button type="button" class="modal-btn btn-error" (click)="errorMessage = ''">
          <i class="bi bi-x-lg"></i>
          <span>Cerrar</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Modal de éxito -->
  <div class="custom-modal-overlay" *ngIf="successMessage">
    <div class="custom-modal modal-success">
      <div class="modal-top">
        <div class="modal-icon success-icon">
          <i class="bi bi-check-circle-fill"></i>
        </div>
        <h3>Proceso realizado</h3>
        <p>{{ successMessage }}</p>
      </div>

      <div class="modal-actions">
        <button type="button" class="modal-btn btn-success" (click)="successMessage = ''">
          <i class="bi bi-check2"></i>
          <span>Entendido</span>
        </button>
      </div>
    </div>
  </div>
</div>
